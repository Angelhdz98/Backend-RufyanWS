# src/test/resources/application-test.properties

spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=360000
application.security.jwt.refresh-token.expiration=8640000

mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.environment=sandbox

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=10MB
