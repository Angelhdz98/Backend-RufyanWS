#perfil de Docker
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
logging.level.org.springframework.security=DEBUG

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.admin-password=${DB_PASSWORD}
spring.datasource.admin-email=${ADMIN_EMAIL}



spring.datasource.developer-email=${DEVELOPER_USERNAME}
spring.datasource.developer-password=${DEVELOPER_PASSWORD}


spring.datasource.db-host=${DB_HOST}
#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000

spring.datasource.app-port=${APP_PORT}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=15MB

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.MercadoPago.backUrl.success=http://localhost:5173/success
spring.MercadoPago.backUrl.failure=http://localhost:5173/failure
spring.MercadoPago.backUrl.pending=http://localhost:5173/pending
spring.MercadoPago.expiration.dayForExpiration=3
mercado_pago.access_token=${MP_ACCESS_TOKEN}
#se agrega el directorio de manera estaticaz|z

app.storage.upload-dir=/app/uploads
app.storage.public-url=https://rufyansilva.com/uploads

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION}
application.security.jwt.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION}

# Hikari Connection Pool (opcional pero recomendado)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

