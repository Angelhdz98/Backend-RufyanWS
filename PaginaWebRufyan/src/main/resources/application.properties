#perfil de Docker
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&serverTimezone=UTC
logging.level.org.springframework.security=DEBUG

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.admin-password=${DB_PASSWORD}
spring.datasource.db-host= ${DB_HOST}
#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.datasource.app-port=${APP_PORT}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.MercadoPago.backUrl.success  = http://localhost:5173/success
spring.MercadoPago.backUrl.failure  = http://localhost:5173/failure
spring.MercadoPago.backUrl.pending  = http://localhost:5173/pending
spring.MercadoPago.expiration.dayForExpiration  = 3
mercado_pago.access_token=${MP_ACCESS_TOKEN}
#se agrega el directorio de manera estatica

app.storage.upload-dir=/uploads/images
app.storage.public-url=https://rufyansilva.com/uploads

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION}
application.security.jwt.refresh-token.expiration= ${REFRESH_TOKEN_EXPIRATION}

# Hikari Connection Pool (opcional pero recomendado)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

