#perfil de Docker
debug=true
spring.datasource.url=jdbc:mysql://172.17.0.1:3307/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_ROOT_PASSWORD}

#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.MercadoPago.backUrl.success  = http://localhost:5173/success
spring.MercadoPago.backUrl.failure  = http://localhost:5173/failure
spring.MercadoPago.backUrl.pending  = http://localhost:5173/pending
spring.MercadoPago.expiration.dayForExpiration  = 3
mercado_pago.access_token=${MP_ACCESS_TOKEN}
#se agrega el directorio de manera estatica
app.upload-dir=./uploaded-images
application.security.jwt.secret-key:${JWT_SECRET_KEY}
application.security.jwt.expiration: ${JWT_EXPIRATION}
application.security.jwt.refresh-token.expiration: ${REFRESH_TOKEN_EXPIRATION}

P

# Hikari Connection Pool (opcional pero recomendado)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

